services:
  - type: web
    name: distributed-health-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_AUTH_SERVICE_URL
        value: https://distributed-health-user-service.onrender.com/api/auth
      - key: VITE_HEALTH_SERVICE_URL
        value: https://distributed-health-data-service.onrender.com/api/health
      - key: VITE_NOTIFICATION_SERVICE_URL
        value: https://distributed-health-notification-service.onrender.com/api/notifications

  - type: web
    name: distributed-health-user-service
    runtime: node
    plan: free
    rootDir: user-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: distributed-health-data-service
    runtime: node
    plan: free
    rootDir: health-data-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: distributed-health-ai-risk-service
          property: hostport
      - key: NOTIFICATION_SERVICE_URL
        fromService:
          type: web
          name: distributed-health-notification-service
          property: hostport

  - type: web
    name: distributed-health-notification-service
    runtime: node
    plan: free
    rootDir: notification-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false

  - type: web
    name: distributed-health-ai-risk-service
    runtime: python
    plan: free
    rootDir: ai-risk-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
